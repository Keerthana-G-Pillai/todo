name: Deploy React to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Locate package.json directory
        id: app
        run: |
          PKG_PATH=$(find . -name package.json -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$PKG_PATH" ]; then
            echo "No package.json found in repository."
            exit 1
          fi
          echo "app_dir=$(dirname "$PKG_PATH")" >> "$GITHUB_OUTPUT"
      - name: Ensure homepage is configured
        working-directory: ${{ steps.app.outputs.app_dir }}
        run: npm pkg set homepage="https://keerthana-g-pillai.github.io/todo"
      - name: Install dependencies
        working-directory: ${{ steps.app.outputs.app_dir }}
        run: npm install
      - name: Build app
        working-directory: ${{ steps.app.outputs.app_dir }}
        run: npm run build
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ steps.app.outputs.app_dir }}/build
